# A generic, single database configuration.

[alembic]
# Path to migration scripts — relative to this ini file
script_location = alembic

# Template for migration file names
file_template = %%(rev)s_%%(slug)s

# Timezone for generated creation dates
timezone = UTC

# sys.path extension — allow importing app modules from project root
prepend_sys_path = .

# Database URL is read from the environment at runtime (see env.py).
# Do NOT hardcode a URL here — it would end up in version control.
sqlalchemy.url =

[post_write_hooks]
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
