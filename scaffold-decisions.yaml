# ============================================
# scaffold-decisions.yaml
# Generated by project-scaffold Phase 1
# Edit before Phase 2 if needed
# ============================================

project:
  name: "Plataforma AI-Native"
  description: "Sistema pedagógico-tecnológico para enseñanza de programación universitaria. Integra tutor IA socrático, registro estructurado del proceso cognitivo (CTR), evaluación multidimensional N4, y gobernanza de coherencia teoría-sistema."
  domain: "education"
  scale: "standard"
  doc_depth: "full"
  state: "greenfield"
  output_language: "es"

stack:
  backend:
    language: "python"
    framework: "fastapi"
    orm: "sqlalchemy-2.0-async"
    port: 8000
  frontend:
    framework: "react-19"
    state_management: "zustand-5"
    styling: "tailwindcss-4"
    bundler: "vite"
    port: 5173
  database:
    primary: "postgresql"
    cache: "redis"
    schemas:
      - operational
      - cognitive
      - governance
      - analytics
  external_services:
    llm: "anthropic-claude"
    auth: "jwt-internal"
    storage: ""
    email: ""
    push: ""
  infrastructure:
    containerization: "docker-compose"
    ci_cd: "github-actions"
    deploy_target: ""

architecture:
  repo_structure: "monorepo"
  monorepo_layout:
    - /backend
    - /frontend
    - /shared
    - /infra
  backend_pattern: "modular-by-domain"
  backend_domain_ownership: "cada fase es dueña de su schema, lee pero no escribe en schemas ajenos"
  frontend_pattern: "feature-folders"
  frontend_layout:
    - /features/student/
    - /features/teacher/
    - /features/exercise/
    - /features/auth/
    - /features/shared/
  design_patterns:
    - repository
    - unit-of-work
    - event-bus
    - hash-chain
  api_style: "rest+websocket"
  api_prefix: "/api/v1/"
  error_format: "custom"
  error_wrapper: "{ status: ok|error, data: {}, meta: { page, total, per_page }, errors: [{ code, message, field }] }"
  multi_tenancy: "none"
  real_time: "websocket"
  real_time_usage: "streaming de respuestas del tutor socrático"
  i18n: "single:es"

security:
  auth_method: "jwt"
  access_token_expiry: "15min"
  refresh_token_expiry: "7d"
  refresh_rotation: true
  mfa: "no"
  roles:
    - name: "alumno"
      permissions:
        - "view:own-courses"
        - "submit:exercises"
        - "chat:tutor"
        - "view:own-profile"
        - "view:own-cognitive-metrics"
    - name: "docente"
      permissions:
        - "manage:courses"
        - "manage:exercises"
        - "view:student-profiles"
        - "view:cognitive-metrics"
        - "view:dashboards"
        - "view:governance-events"
    - name: "admin"
      permissions:
        - "manage:users"
        - "manage:system-config"
        - "manage:tutor-prompts"
        - "view:all"
  rate_limiting:
    tutor_chat: "30 msg/hora por alumno"
    general: "100 req/min"
  sensitive_data:
    - "passwords (bcrypt)"
    - "anthropic api key"
  compliance:
    - "gobernanza interna empate3"
  cors_origins:
    - "http://localhost:5173"
  secrets_management: "env vars (dev), docker secrets (prod)"
  sandbox:
    timeout: "10s"
    memory_limit: "128MB"
    network: false
    filesystem: "/tmp only"

team:
  size: 4
  members: []
  branching: "github-flow"
  commit_style: "conventional"
  issue_tracker: "github-issues"

features:
  epics:
    - id: "EPIC-0"
      name: "Fundación Compartida"
      phase: "Fase 0"
      duration: "Semanas 1-2"
      stories:
        - id: "E0-S1"
          title: "Setup monorepo con estructura /backend, /frontend, /shared, /infra"
          priority: "critical"
          dependencies: []
        - id: "E0-S2"
          title: "Docker Compose: api + db + frontend con hot reload"
          priority: "critical"
          dependencies: ["E0-S1"]
        - id: "E0-S3"
          title: "PostgreSQL con 4 schemas iniciales (operational, cognitive, governance, analytics)"
          priority: "critical"
          dependencies: ["E0-S2"]
        - id: "E0-S4"
          title: "Auth JWT + RBAC (alumno/docente/admin) con refresh rotation"
          priority: "critical"
          dependencies: ["E0-S3"]
        - id: "E0-S5"
          title: "OpenAPI spec completo + tipos TypeScript auto-generados"
          priority: "high"
          dependencies: ["E0-S3"]
        - id: "E0-S6"
          title: "CI pipeline básico: lint + tests + build en GitHub Actions"
          priority: "high"
          dependencies: ["E0-S1"]
        - id: "E0-S7"
          title: "Seed data: 1 curso, 1 comisión, 3 ejercicios, 2 usuarios (1 alumno, 1 docente)"
          priority: "medium"
          dependencies: ["E0-S3", "E0-S4"]

    - id: "EPIC-1"
      name: "Core Académico + Sandbox"
      phase: "Fase 1"
      duration: "Semanas 3-12 (paralelo)"
      stories:
        - id: "E1-S1"
          title: "CRUD cursos, comisiones, ejercicios, enrollments"
          priority: "critical"
          dependencies: ["EPIC-0"]
        - id: "E1-S2"
          title: "Submission flow: crear draft, ejecutar en sandbox, enviar"
          priority: "critical"
          dependencies: ["E1-S1"]
        - id: "E1-S3"
          title: "Sandbox Python seguro (timeout 10s, memory 128MB, sin red, sin filesystem)"
          priority: "critical"
          dependencies: ["E1-S1"]
        - id: "E1-S4"
          title: "Code snapshots automáticos cada 30s + ante ejecución"
          priority: "high"
          dependencies: ["E1-S2"]
        - id: "E1-S5"
          title: "Test cases del ejercicio como assertions con reporte pass/fail individual"
          priority: "high"
          dependencies: ["E1-S3"]

    - id: "EPIC-2"
      name: "Tutor IA Socrático"
      phase: "Fase 2"
      duration: "Semanas 3-12 (paralelo)"
      stories:
        - id: "E2-S1"
          title: "Chat streaming alumno-tutor via WebSocket"
          priority: "critical"
          dependencies: ["EPIC-0"]
        - id: "E2-S2"
          title: "System prompt socrático versionado con SHA-256"
          priority: "critical"
          dependencies: ["E2-S1"]
        - id: "E2-S3"
          title: "Constructor de contexto (ejercicio + código actual + historial)"
          priority: "critical"
          dependencies: ["E2-S1"]
        - id: "E2-S4"
          title: "Post-procesador / guardrails anti-solver"
          priority: "critical"
          dependencies: ["E2-S2"]
        - id: "E2-S5"
          title: "Clasificación N4 de cada interacción (critical/exploratory/dependent)"
          priority: "high"
          dependencies: ["E2-S1"]
        - id: "E2-S6"
          title: "Reflexión post-ejercicio (formulario guiado)"
          priority: "high"
          dependencies: ["E2-S1"]
        - id: "E2-S7"
          title: "Registro de governance events (policy violations, prompt updates)"
          priority: "medium"
          dependencies: ["E2-S4"]

    - id: "EPIC-3"
      name: "Motor Cognitivo + Evaluación"
      phase: "Fase 3"
      duration: "Semanas 3-12 (paralelo)"
      stories:
        - id: "E3-S1"
          title: "Cognitive Event Classifier (event_type → N1-N4 según mapeo empate3)"
          priority: "critical"
          dependencies: ["EPIC-0"]
        - id: "E3-S2"
          title: "CTR Builder con hash chain SHA-256 encadenado"
          priority: "critical"
          dependencies: ["E3-S1"]
        - id: "E3-S3"
          title: "Validación CTR mínimo (al menos 1 evento por N1-N4)"
          priority: "critical"
          dependencies: ["E3-S2"]
        - id: "E3-S4"
          title: "Cognitive Worker: métricas N1-N4 + Qe + dependency por sesión"
          priority: "critical"
          dependencies: ["E3-S2"]
        - id: "E3-S5"
          title: "Risk Worker: detección de alumnos en riesgo (dependency/disengagement/stagnation)"
          priority: "high"
          dependencies: ["E3-S4"]
        - id: "E3-S6"
          title: "Evaluation Engine: E = f(N1, N2, N3, N4, Qe)"
          priority: "high"
          dependencies: ["E3-S4"]

    - id: "EPIC-4"
      name: "Frontend Completo"
      phase: "Fase 4"
      duration: "Semanas 3-12 (paralelo), integración Semanas 13-14"
      stories:
        - id: "E4-S1"
          title: "Dashboard alumno: cursos, ejercicios pendientes/completados, progreso"
          priority: "critical"
          dependencies: ["EPIC-0"]
        - id: "E4-S2"
          title: "Vista de ejercicio: Monaco Editor + chat tutor + panel output (3 paneles)"
          priority: "critical"
          dependencies: ["E4-S1"]
        - id: "E4-S3"
          title: "Panel de reflexión post-ejercicio"
          priority: "high"
          dependencies: ["E4-S2"]
        - id: "E4-S4"
          title: "Dashboard docente: indicadores agregados, radar N1-N4, alumnos en riesgo"
          priority: "critical"
          dependencies: ["E4-S1"]
        - id: "E4-S5"
          title: "Traza cognitiva visual: timeline con eventos color-coded N1-N4 + diff código"
          priority: "high"
          dependencies: ["E4-S4"]
        - id: "E4-S6"
          title: "Patrones de ejercicio: vista agregada de estrategias de la clase"
          priority: "medium"
          dependencies: ["E4-S4"]
        - id: "E4-S7"
          title: "Reportes de gobernanza: violaciones, cambios de prompts, alertas"
          priority: "medium"
          dependencies: ["E4-S4"]
        - id: "E4-S8"
          title: "MSW (Mock Service Worker) para desarrollo paralelo con APIs mock"
          priority: "critical"
          dependencies: ["E4-S1"]
        - id: "E4-S9"
          title: "Responsive para tablet en aula"
          priority: "medium"
          dependencies: ["E4-S2", "E4-S4"]

  business_rules:
    - id: "BR-1"
      domain: "tutor"
      description: "El tutor NUNCA entrega soluciones completas. Máximo 3-5 líneas de código parcial y contextual."
      enforcement: "post-procesador guardrails + policy_check_result en cada interacción"
    - id: "BR-2"
      domain: "evaluación"
      description: "Toda evaluación debe derivarse del modelo N4: E = f(N1, N2, N3, N4, Qe). NUNCA E = correctness(output)."
      enforcement: "evaluation engine, nunca score binario"
    - id: "BR-3"
      domain: "trazabilidad"
      description: "Todo evento cognitivo debe incluir contexto (tiempo, problema, estado del estudiante). No hay dato sin contexto."
      enforcement: "cognitive event classifier + CTR builder"
    - id: "BR-4"
      domain: "trazabilidad"
      description: "Toda interacción con IA debe registrarse: prompt, respuesta, clasificación N4."
      enforcement: "tutor interaction logger + hash chain"
    - id: "BR-5"
      domain: "gobernanza"
      description: "Cada turno del tutor incluye SHA-256 del prompt vigente para reconstrucción criptográfica."
      enforcement: "tutor system prompts versionados"
    - id: "BR-6"
      domain: "integridad"
      description: "El CTR es inmutable post-cierre. Hash encadenado: hash(n) = SHA256(hash(n-1) + datos(n))."
      enforcement: "CTR builder + validación de integridad"
    - id: "BR-7"
      domain: "propiedad-datos"
      description: "Solo la fase dueña de un schema puede INSERT/UPDATE/DELETE. Otras fases leen via REST."
      enforcement: "permisos de DB + API contracts"
    - id: "BR-8"
      domain: "sandbox"
      description: "Código del alumno ejecutado en aislamiento: timeout 10s, 128MB RAM, sin red, sin filesystem fuera de /tmp."
      enforcement: "subprocess con restricciones / Docker seccomp en prod"

testing:
  backend_framework: "pytest + httpx (async)"
  frontend_framework: "vitest + playwright"
  db_strategy: "testcontainers (postgresql real)"
  ci_tests: true
  tdd: false
  coverage_target: "80%"
  adversarial_tutor_tests: "20+ prompts adversarios para verificar que el tutor no entrega soluciones"

monitoring:
  logging: "structured json"
  metrics: ""
  alerts: ""
  health_checks: true
  health_endpoint: "/api/v1/health"

database:
  migrations: "alembic auto-generate"
  seeds: "idempotent dev seed"
  soft_delete: "entidades core (students, courses, submissions)"
  hard_delete_exceptions: "CTR events (inmutables por hash chain)"
  auditing: "created_at/updated_at en todas las tablas"

agents:
  - backend-fastapi
  - persistence-sqlalchemy
  - frontend-react
  - auth-security
  - redis-infrastructure

skills:
  - fastapi-domain-service
  - sqlalchemy-patterns
  - zustand-store-pattern
  - tailwind-theme-system
  - redis-best-practices
  - websocket-patterns
  - api-security

