worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ──────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ─── Performance ──────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Tamaño máximo para submissions de código (archivos de código fuente)
    client_max_body_size 10M;

    # ─── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        application/xml
        image/svg+xml;

    # ─── Upstream: FastAPI ────────────────────────────────────────────────
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ─── Security Headers ─────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"            always;
        add_header X-Content-Type-Options    "nosniff"               always;
        add_header X-XSS-Protection          "1; mode=block"         always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:;"
            always;

        # ─── API REST ─────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts generosos para respuestas del tutor IA (LLM puede tardar)
            proxy_read_timeout    120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
        }

        # ─── WebSocket ───────────────────────────────────────────────────
        location /ws/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;

            # Headers necesarios para upgrade WebSocket
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSockets necesitan timeouts largos (conexión persistente)
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 10s;
        }

        # ─── Frontend SPA ────────────────────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;

            # Fallback SPA: rutas de React Router
            try_files $uri $uri/ /index.html;

            # Cache assets estáticos con hash en el nombre
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ─── Health check interno ─────────────────────────────────────────
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
