version: "3.9"

services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ainative-net

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ainative
      POSTGRES_PASSWORD: ainative
      POSTGRES_DB: ainative
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ainative -d ainative"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ainative-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ainative-net

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    networks:
      - ainative-net

networks:
  ainative-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
