version: "3.9"

services:
  api:
    build:
      context: ../backend
    working_dir: /app
    volumes:
      - ../backend:/app
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://ainative:ainative@db:5432/ainative
      REDIS_URL: redis://redis:6379/0
    command: uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8001 --reload
    networks:
      - ainative-net

  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ainative
      POSTGRES_PASSWORD: ainative
      POSTGRES_DB: ainative
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ainative -d ainative"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ainative-net

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ainative-net

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "5174:5174"
    environment:
      VITE_PROXY_TARGET: http://api:8001
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api
    networks:
      - ainative-net

networks:
  ainative-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  frontend-node-modules:
