services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ainative}:${POSTGRES_PASSWORD:-ainative}@db:5432/${POSTGRES_DB:-ainative}
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ainative-net

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "80:4173"
    environment:
      VITE_API_URL: /api
    command: sh -c "npm install && npm run build && npm run preview -- --host 0.0.0.0 --port 4173"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ainative-net

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ainative}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ainative}
      POSTGRES_DB: ${POSTGRES_DB:-ainative}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../devOps/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ainative} -d ${POSTGRES_DB:-ainative}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - ainative-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - ainative-net

networks:
  ainative-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  frontend-node-modules:
