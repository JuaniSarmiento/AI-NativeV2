services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ainative}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ainative}
      POSTGRES_DB: ${POSTGRES_DB:-ainative}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ../backend
    ports:
      - "8001:8001"
    volumes:
      - ../backend:/app
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ainative}:${POSTGRES_PASSWORD:-ainative}@db:5432/${POSTGRES_DB:-ainative}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      exec uvicorn app.main:create_app --factory
      --host 0.0.0.0 --port 8001 --reload"
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    ports:
      - "5174:5174"
    volumes:
      - ../frontend/src:/app/src
    env_file:
      - ../.env
    environment:
      VITE_PROXY_TARGET: http://api:8001
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
